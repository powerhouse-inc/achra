name: E2E Tests

on:
  pull_request:
    branches: ['main', 'staging', 'dev']
    types: [opened, synchronize]
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  HUSKY: 0
  CI: 'true'

jobs:
  pr:
    name: PR (smoke + flow, chromium)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run @smoke + @flow on chromium
        env:
          NEXT_PUBLIC_ENVIRONMENT: staging
          NEXT_PUBLIC_SWITCHBOARD_URL: ${{ secrets.E2E_SWITCHBOARD_URL }}
          NEXT_PUBLIC_ETH_MAINNET_RPC: https://ethereum-rpc.publicnode.com
          NEXT_PUBLIC_SHOW_WHITELIST_OVERLAY: 'false'
          NEXT_PUBLIC_LEAVE_PAGE_GUARD_ENABLED: 'false'
          NEXT_PUBLIC_ENABLE_SERVICE_PURCHASE_STORE_PERSISTENCE: 'false'
        run: >-
          pnpm exec playwright test
          --project=chromium
          --grep "@smoke|@flow"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr
          path: playwright-report/
          retention-days: 7

      - name: Upload traces / videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-pr
          path: test-results/
          retention-days: 7

  nightly:
    name: Nightly (full suite, chromium + webkit)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps ${{ matrix.project }}

      - name: Run full suite
        env:
          NEXT_PUBLIC_ENVIRONMENT: staging
          NEXT_PUBLIC_SWITCHBOARD_URL: ${{ secrets.E2E_SWITCHBOARD_URL }}
          NEXT_PUBLIC_ETH_MAINNET_RPC: https://ethereum-rpc.publicnode.com
          NEXT_PUBLIC_SHOW_WHITELIST_OVERLAY: 'false'
          NEXT_PUBLIC_LEAVE_PAGE_GUARD_ENABLED: 'false'
          NEXT_PUBLIC_ENABLE_SERVICE_PURCHASE_STORE_PERSISTENCE: 'false'
        run: pnpm exec playwright test --project=${{ matrix.project }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

      - name: Upload traces / videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-nightly-${{ matrix.project }}
          path: test-results/
          retention-days: 7
