query ResourceProfile($filter: RSResourceTemplatesFilter) {
  resourceTemplates(filter: $filter) {
    ...ResourceProfileFields
  }
}

fragment ResourceProfileFields on RSResourceTemplate {
  id
  infoLink
  title
  description
  thumbnailUrl
  summary
  status
  operatorId
  setupServices
  recurringServices
  contentSections {
    ...ContentSectionFields
  }
  faqFields {
    ...FaqFieldFields
  }
}
