query ResourceProfile($filter: RSResourceTemplatesFilter) {
  resourceTemplates(filter: $filter) {
    id
    infoLink
    title
    description
    thumbnailUrl
    summary
    status
    operatorId
    contentSections {
      content
      displayOrder
      id
      title
    }
    faqFields {
      answer
      displayOrder
      id
      question
    }
  }
}
