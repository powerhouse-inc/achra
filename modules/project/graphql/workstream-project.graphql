query WorkstreamProject($filter: WorkstreamFilter!) {
  workstream(filter: $filter) {
    title
    status
    slug

    initialProposal {
      status
      author {
        id
        name
      }
      sow {
        contributors {
          id
          icon
          slug
          name
        }
        description
        title
        status
        projects {
          abstract
          slug
          code
          currency
          id
          imageUrl
          projectOwner
          title
          budget
          budgetType
          expenditure {
            cap
          }
          scope {
            status

            progress {
              ... on SOW_Percentage {
                value
              }
            }
            deliverables
          }
        }
        deliverables {
          id
          code
          title
          description
          status
          keyResults {
            id
            link
            title
          }
          workProgress {
            ... on SOW_StoryPoint {
              total
              completed
            }
            ... on SOW_Percentage {
              value
            }
            ... on SOW_Binary {
              done
            }
          }
          budgetAnchor {
            unitCost
            unit
            quantity
          }
        }
      }
    }
  }
}
