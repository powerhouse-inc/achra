query ScopeOfWork($identifier: String!) {
  ScopeOfWork {
    document(identifier: $identifier) {
      document {
        id
        state {
          global {
            roadmaps {
              id
              slug
              title
              description
              milestones {
                description
                budget
                title
                sequenceCode
                id
                coordinators
                deliveryTarget
                scope {
                  deliverables
                  deliverablesCompleted {
                    completed
                    total
                  }
                  status
                }
              }
            }
            contributors {
              id
              name
            }
            deliverables {
              budgetAnchor {
                margin
                project
                quantity
                unit
                unitCost
              }
              code
              description
              id
              keyResults {
                id
                link
                title
              }
              owner
              status
              title
            }
            description
            projects {
              abstract
              budget
              budgetType
              code
              currency
              expenditure {
                actuals
                cap
                percentage
              }
              id
              imageUrl
              projectOwner
              title
              scope {
                status
                deliverablesCompleted {
                  completed
                  total
                }
                deliverables
              }
            }
            status
            title
          }
        }
      }
      childIds
    }
  }
}
