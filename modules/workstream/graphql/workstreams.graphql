query Workstreams($filter: WorkstreamsFilter) {
  workstreams(filter: $filter) {
    title
    status
    slug
    client {
      name
      icon
    }
    initialProposal {
      status
      author {
        name
      }
      paymentTerms {
        proposer
        currency
        totalAmount
        paymentModel
      }
      sow {
        description
        roadmaps {
          milestones {
            budget
            scope {
              deliverables
            }
          }
        }
        deliverables {
          id
          code
          title
          description
        }
        projects {
          id
          code
          abstract
          code
          title
          projectOwner
          imageUrl
          budget
          currency
          expenditure {
            cap
          }
          scope {
            status
            progress {
              ... on SOW_Percentage {
                value
              }
            }
            deliverables
          }
        }
      }
    }
    rfp {
      title
      summary
      budgetMax
      budgetMin
      budgetCurrency
      briefing
      submissionDeadline
    }
    sow {
      projects {
        title
      }
      roadmaps {
        milestones {
          id
        }
      }
    }
    alternativeProposals {
      id
    }
    network {
      name
      logo
      darkThemeLogo
      slug
    }
  }
}
