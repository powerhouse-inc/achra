query Workstreams($filter: WorkstreamsFilter) {
  workstreams(filter: $filter) {
    title
    status
    client {
      name
    }
    initialProposal {
      status
      author {
        name
      }
      paymentTerms {
        proposer
        currency
        totalAmount
        paymentModel
      }
      sow {
        roadmaps {
          milestones {
            budget
            scope {
              deliverables
            }
          }
        }
      }
    }
    rfp {
      title
      summary
      budgetMax
      budgetMin
      budgetCurrency
      briefing
      submissionDeadline
    }
    sow {
      projects {
        title
      }
      roadmaps {
        milestones {
          id
        }
      }
    }
    alternativeProposals {
      id
    }
  }
}
