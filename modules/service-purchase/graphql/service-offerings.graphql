query ServiceOfferings {
  serviceOfferings {
    id
    operatorId
    resourceTemplateId
    title
    summary
    description
    thumbnailUrl
    infoLink
    status
    lastModified
    tiers {
      id
      name
      description
      isCustomPricing
      pricing {
        amount
        currency
      }
      pricingOptions {
        id
        amount
        currency
        isDefault
      }
      serviceLevels {
        id
        serviceId
        level
        customValue
        optionGroupId
      }
      usageLimits {
        id
        serviceId
        metric
        unitName

        notes
        unitPrice
        unitPriceCurrency
      }
    }
    targetAudiences {
      id
      label
      color
    }

    facetTargets {
      id
      categoryKey
      categoryLabel
      selectedOptions
    }
    services {
      id
      title
      description
      displayOrder
      isSetupFormation
      optionGroupId
      facetBindings {
        id
        facetName
        facetType
        supportedOptions
      }
    }
    optionGroups {
      id
      name
      description
      costType
      isAddOn
      defaultSelected
      price
      currency
      billingCycle
    }
    serviceGroups {
      id
      name
      description
      billingCycle
      displayOrder
    }
  }
}
