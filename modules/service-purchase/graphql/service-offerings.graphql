query ServiceOfferings($filter: RSServiceOfferingsFilter) {
  serviceOfferings(filter: $filter) {
    id
    description
    infoLink
    lastModified
    operatorId
    title
    thumbnailUrl
    tiers {
      id
      name
      description
      isCustomPricing
      pricingMode
      pricing {
        amount
        currency
      }
      serviceLevels {
        id
        serviceId
        level
        customValue
        optionGroupId
      }
      usageLimits {
        id
        serviceId
        metric
        unitName
        freeLimit
        paidLimit
        resetCycle
        notes
        unitPrice
        unitPriceCurrency
      }
    }
    facetTargets {
      id
      categoryKey
      categoryLabel
      selectedOptions
    }
    finalConfiguration {
      selectedTierId
      selectedBillingCycle
      tierBasePrice
      tierCurrency
      optionGroupConfigs {
        id
        optionGroupId
        effectiveBillingCycle
        billingCycleOverridden
        discountStripped
        recurringAmount
        currency
        discount {
          discountType
          discountValue
          originalAmount
          discountedAmount
        }
        setupCost
        setupCostCurrency
        setupCostDiscount {
          discountType
          discountValue
          originalAmount
          discountedAmount
        }
      }
      lastModified
      addOnConfigs {
        id
        optionGroupId
        selectedBillingCycle
        recurringAmount
        currency
        discount {
          discountType
          discountValue
          originalAmount
          discountedAmount
        }
        setupCost
        setupCostCurrency
        setupCostDiscount {
          discountType
          discountValue
          originalAmount
          discountedAmount
        }
      }
    }

    optionGroups {
      id
      name
      description
      isAddOn
      defaultSelected
      pricingMode
      standalonePricing {
        setupCost {
          amount
          currency
          discount {
            discountType
            discountValue
          }
        }
        recurringPricing {
          id
          billingCycle
          amount
          currency
          discount {
            discountType
            discountValue
          }
        }
      }
      tierDependentPricing {
        id
        tierId
        setupCost {
          amount
          currency
          discount {
            discountType
            discountValue
          }
        }
        setupCostDiscounts {
          billingCycle
          discountRule {
            discountType
            discountValue
          }
        }
        recurringPricing {
          id
          billingCycle
          amount
          currency
          discount {
            discountType
            discountValue
          }
        }
      }
      costType
      availableBillingCycles
      price
      currency
    }
    serviceGroups {
      id
      name
      description
      billingCycle
      displayOrder
      tierPricing {
        id
        tierId
        setupCostsPerCycle {
          id
          billingCycle
          amount
          currency
          discount {
            discountType
            discountValue
          }
        }
        recurringPricing {
          id
          billingCycle
          amount
          currency
          discount {
            discountType
            discountValue
          }
        }
      }
    }
    resourceTemplateId
    services {
      id
      title
      description
      displayOrder
      serviceGroupId
      isSetupFormation
      optionGroupId
      #facetBindings {
      #  id
      #  facetName
      #  facetType
      #  supportedOptions
      #}
    }
    status
    summary
    targetAudiences {
      id
      label
      color
    }
  }
}
