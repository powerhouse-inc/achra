query ResourceTemplate($filter: RSResourceTemplatesFilter) {
  resourceTemplates(filter: $filter) {
    ...PurchaseResourceTemplateFields
  }
}

fragment PurchaseResourceTemplateFields on RSResourceTemplate {
  id
  title
  subtitle
  description
  thumbnailUrl
  summary
  status
  operatorId
  faqFields {
    ...FaqFieldFields
  }
  contentSections {
    ...ContentSectionFields
  }
}
