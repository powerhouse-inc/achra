query ResourceTemplates($filter: RSResourceTemplatesFilter) {
  resourceTemplates(filter: $filter) {
    contentSections {
      id
      title
      content
      displayOrder
    }
    description
    facetTargets {
      id
      categoryKey
      categoryLabel
      selectedOptions
    }
    faqFields {
      id
      question
      answer
      displayOrder
    }
    infoLink
    lastModified
    title
    thumbnailUrl
    targetAudiences {
      id
      label
      color
    }
    operatorId
    recurringServices
    status
    summary
    setupServices
    id
  }
}
